<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAJ RESORTS</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

.card{

width:360px;

background:rgba(255,255,255,.10);

backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,.18);

padding:40px;

border-radius:25px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.45);

}

.logo{

width:90px;
height:90px;

border-radius:50%;

background:white;

display:flex;

justify-content:center;

align-items:center;

margin:auto;

font-size:40px;

}

h1{

margin-top:20px;

font-family:'Cinzel',serif;

letter-spacing:2px;

color:#FFD86B;

font-size:32px;

}

p{

color:white;

margin-top:10px;

margin-bottom:35px;

}

.button{

display:block;

text-decoration:none;

padding:16px;

margin:15px 0;

border-radius:50px;

font-weight:600;

transition:.3s;

font-size:17px;

}

.maps{

background:#34A853;

color:white;

}

.maps:hover{

transform:scale(1.03);

}

.instagram{

background:linear-gradient(45deg,#833AB4,#E1306C,#F77737);

color:white;

}

.instagram:hover{

transform:scale(1.03);

}

.footer{

margin-top:25px;

font-size:13px;

color:#ddd;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">🏨</div>

<h1>TAJ RESORTS</h1>

<p>Luxury • Comfort • Memories</p>

<a class="button maps"
href="https://maps.app.goo.gl/rUtUHLLSJhymMSfg6"
target="_blank">

📍 Find Us on Google Maps

</a>

<a class="button instagram"
https://www.instagram.com/tajresortss/?utm_source=ig_web_button_share_sheet
target="_blank">

📷 Follow Us on Instagram

</a>

<div class="footer">

Thank you for visiting ❤️

</div>

</div>

</body>

</html>
