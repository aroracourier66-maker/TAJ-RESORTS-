<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TAJ RESORTS</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:'Poppins',sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;


    background:
    linear-gradient(
        rgba(0,0,0,.45),
        rgba(0,0,0,.75)
    ),
    url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1600&q=80");


    background-size:cover;
    background-position:center;

    overflow:hidden;

}



/* Floating Card */

.card{

    width:380px;

    padding:45px 35px;

    text-align:center;


    background:
    rgba(255,255,255,0.12);


    backdrop-filter:blur(18px);


    border-radius:30px;


    border:1px solid rgba(255,255,255,.25);


    box-shadow:

    0 20px 50px rgba(0,0,0,.55);


    animation:slideUp 1s ease;


}



/* Logo */

.logo{

    width:120px;
    height:120px;

    border-radius:50%;

    background:white;

    display:logo.png;
    justify-content:center;
    align-items:center;

    margin:auto;

    padding:10px;

    overflow:hidden;

    border:4px solid rgba(255,255,255,.5);

    box-shadow:
    0 10px 30px rgba(0,0,0,.4);

    animation:pulse 3s infinite;

}


.logo img{

    width:100%;
    height:100%;

    object-fit:contain;

    border-radius:50%;

}


/* Heading */

h1{

    margin-top:25px;


    font-family:'Cinzel',serif;


    letter-spacing:3px;


    color:#FFD86B;


    font-size:34px;


    text-shadow:

    0 3px 10px rgba(0,0,0,.5);

}



/* Tagline */

p{

    color:white;


    margin-top:12px;


    margin-bottom:35px;


    font-size:16px;


    letter-spacing:1px;


    font-weight:300;

}



/* Buttons */

.button{


    display:block;


    text-decoration:none;


    padding:16px;


    margin:18px 0;


    border-radius:50px;


    font-size:16px;


    font-weight:600;


    position:relative;


    overflow:hidden;


    transition:.4s;


}



/* Button shine */

.button::before{


    content:"";


    position:absolute;


    top:0;


    left:-100%;


    width:100%;


    height:100%;


    background:

    linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.5),
    transparent
    );


    transition:.5s;


}


.button:hover::before{

    left:100%;

}


.button:hover{

    transform:translateY(-5px);

    box-shadow:

    0 10px 25px rgba(0,0,0,.4);

}



/* Google Maps */

.maps{

    background:

    linear-gradient(
    45deg,
    #34A853,
    #0F9D58
    );


    color:white;

}



/* Instagram */

.instagram{


    background:

    linear-gradient(
    45deg,
    #833AB4,
    #E1306C,
    #F77737
    );


    color:white;

}



/* Footer */


.footer{

    margin-top:30px;


    font-size:14px;


    color:#eee;


    opacity:.9;

}



/* Animations */


@keyframes slideUp{

    from{

        opacity:0;

        transform:translateY(40px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}



@keyframes pulse{

    0%,100%{

        transform:scale(1);

    }


    50%{

        transform:scale(1.05);

    }

}



/* Mobile */

@media(max-width:450px){


.card{

    width:90%;

    padding:35px 25px;

}


h1{

    font-size:28px;

}


.button{

    font-size:15px;

}


}


</style>

</head>


<body>


<div class="card">


<div class="logo">
🏨
</div>


<h1>
TAJ RESORTS
</h1>


<p>
Luxury • Comfort • Memories
</p>



<a class="button maps"
href="https://maps.app.goo.gl/rUtUHLLSJhymMSfg6"
target="_blank">

📍 Find Us on Google Maps

</a>




<a class="button instagram"
href="https://www.instagram.com/tajresortss/"
target="_blank">

📷 Follow Us on Instagram

</a>



<div class="footer">

Thank you for visiting ❤️

</div>


</div>


</body>

</html>
